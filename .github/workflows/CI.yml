name: Pheonix Test Automation workflow

on:
  push:
    branches: [ "master" ]
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch:
   inputs:
    env:
      description: "Environment"
      type: choice
      options: [qa,uat,dev]
      default: qa
      required: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    
       

    - name: Default value for execution
      id: default
      run: 
              echo "env=${{ github.event.inputs.env || 'qa'}}" >> $GITHUB_OUTPUT
              
    - name: Execute Test Automation Framework
      run: mvn test -DsuiteXmlFile=testng.xml -Denv="${{ steps.default.outputs.env }}"

    - name: Upload a Build Artifact
      if: always()
      uses: actions/upload-artifact@v4.6.2
      with:
          name: SureFire Report
          path: target/surefire-reports/
          retention-days: 10

